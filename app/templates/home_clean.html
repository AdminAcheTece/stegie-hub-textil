<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stegie</title>

  <!-- Fonte bem clean (próxima do “feeling” do Google) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/stegie.css') }}?v={{ config.get('ASSET_VERSION','1') }}">
</head>

<body class="home-clean">

  <!-- SVG sprite (DEVE ficar invisível) -->
  <svg class="home-icons-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-menu" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-wrench" viewBox="0 0 24 24">
      <path d="M14.7 6.3a5 5 0 0 0-6.5 6.5L3 18l3 3 5.2-5.2a5 5 0 0 0 6.5-6.5l-2.2 2.2-2.8-2.8 2-2.3Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-grad" viewBox="0 0 24 24">
      <path d="M12 3 2 8l10 5 10-5-10-5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M6 10v6c0 1.7 2.7 3 6 3s6-1.3 6-3v-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-file" viewBox="0 0 24 24">
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-6Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8 13h8M8 17h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 19a2 2 0 0 0 2 2h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M4 5a2 2 0 0 1 2-2h14v16H6a2 2 0 0 0-2 2V5Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-briefcase" viewBox="0 0 24 24">
      <path d="M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M4 7h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M2 12h20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </svg>

  <!-- Topo direito: sanduíche + avatar -->
  <header class="home-top" aria-label="Topo">
    <div class="home-top-spacer"></div>

    <div class="home-top-actions">
      <button class="icon-btn" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="homeMenu">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-menu"></use></svg>
      </button>

      <a class="avatar" href="{{ account.href }}" aria-label="Conta">
        <span>{{ account.initials }}</span>
      </a>

      <div class="menu" id="homeMenu" role="menu" aria-label="Menu principal">
        {% for l in nav_links %}
          <a class="menu-item" role="menuitem" href="{{ l.href }}">{{ l.label }}</a>
        {% endfor %}
      </div>
    </div>
  </header>

  <main class="home-wrap">
    <section class="home-center" aria-label="Home Stegie">

      <!-- Logo estilo Google: “Stegie” (S maiúsculo e resto minúsculo) -->
      <div class="home-brand" aria-label="Stegie">Stegie</div>

      <!-- Barra central (estética / acesso rápido) -->
      <div class="home-pill" aria-label="Acesso rápido">
        <span class="home-pill-dot" aria-hidden="true"></span>
        <span class="home-pill-text">Acesso rápido aos recursos da plataforma</span>
      </div>

      <!-- Atalhos (somente os que você manteve) -->
      <nav class="home-shortcuts" aria-label="Atalhos">
        {% for s in shortcuts %}
          <a class="shortcut" href="{{ s.href }}" aria-label="{{ s.label }}">
            <span class="shortcut-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24"><use href="#{{ s.icon }}"></use></svg>
            </span>
            <span class="shortcut-label">{{ s.label }}</span>
          </a>
        {% endfor %}
      </nav>
    </section>
  </main>

  <!-- Rodapé (como o Google: links “expostos” embaixo) -->
  <footer class="home-footer" aria-label="Rodapé">
    <div class="footer-row footer-country">Brasil</div>
    <div class="footer-row footer-links">
      {% for l in nav_links %}
        <a href="{{ l.href }}">{{ l.label }}</a>
      {% endfor %}
    </div>
  </footer>

  <script>
    (function(){
      const btn = document.getElementById('menuBtn');
      const menu = document.getElementById('homeMenu');

      function closeMenu(){
        btn.setAttribute('aria-expanded', 'false');
        menu.classList.remove('is-open');
      }
      function toggleMenu(){
        const open = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!open));
        menu.classList.toggle('is-open', !open);
      }

      btn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });

      document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== btn) closeMenu();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });
    })();
  </script>
</body>
</html>
