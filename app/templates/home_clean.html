<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STEGIE</title>

  <!-- Se seu Flask usa static_folder="estática", isso continua sendo /static/... -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/stegie.css') }}?v={{ config.get('ASSET_VERSION','1') }}">
</head>

<body class="home-clean">
  <!-- Sprite de ícones (inline) -->
  <svg class="home-icons-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-tools" viewBox="0 0 24 24">
      <path d="M14.7 6.3a5 5 0 0 0-6.5 6.5L3 18l3 3 5.2-5.2a5 5 0 0 0 6.5-6.5l-2.2 2.2-2.8-2.8 2.0-2.3Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-grid" viewBox="0 0 24 24">
      <path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-credit" viewBox="0 0 24 24">
      <path d="M3.5 7.5h17A2 2 0 0 1 22.5 9.5v8A2 2 0 0 1 20.5 19.5h-17A2 2 0 0 1 1.5 17.5v-8A2 2 0 0 1 3.5 7.5Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M1.5 11h21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M5 16h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-chat" viewBox="0 0 24 24">
      <path d="M20 15a4 4 0 0 1-4 4H9l-5 3 1.2-4.2A4 4 0 0 1 4 15V7a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v8Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M8 9h8M8 12h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-users" viewBox="0 0 24 24">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-shield" viewBox="0 0 24 24">
      <path d="M12 2l8 4v6c0 5-3.4 9.4-8 10-4.6-.6-8-5-8-10V6l8-4Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M9.2 12.3l1.8 1.8 3.8-4"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-user" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>
  </svg>

  <main class="home-wrap">
    <section class="home-center" aria-label="Página inicial Stegie">
      <div class="home-brand" aria-label="STEGIE">STEGIE</div>

      <!-- Opcional: um “campo” central só para estética (ou para implementar busca depois) -->
      <div class="home-pill" role="search" aria-label="Acesso rápido">
        <span class="home-pill-dot" aria-hidden="true"></span>
        <span class="home-pill-text">Acesso rápido aos recursos da plataforma</span>
      </div>

      <nav class="home-shortcuts" aria-label="Atalhos">
        {% for s in shortcuts %}
          <a class="shortcut" href="{{ s.href }}" aria-label="{{ s.label }}">
            <span class="shortcut-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24"><use href="#{{ s.icon }}"></use></svg>
            </span>
            <span class="shortcut-label">{{ s.label }}</span>
          </a>
        {% endfor %}
      </nav>
    </section>
  </main>
</body>
</html>
