<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stegie</title>

  <!-- Fonte clean (feeling “Google-like”) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter base + Manrope (wordmark) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/stegie.css') }}?v={{ config.get('ASSET_VERSION','1') }}">

  <!-- Overrides somente para a home (preto/branco + ajustes pontuais) -->
  <style>
    /* Paleta preto/branco (sem verde) */
    .home-clean{
      --primary: #111;
      --text: #111;
      --muted: rgba(0,0,0,.68);
      --border: rgba(0,0,0,.12);
      --surface: rgba(255,255,255,.78);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #111;
    }

    /* Fontes um pouco maiores (sem mexer no “Stegie”) */
    .shortcut-label{ font-size: 14px !important; }
    .menu-item{ font-size: 14.5px !important; }
    .footer-links a{ font-size: 13.5px !important; }

    /* Sprite de ícones nunca aparece */
    .home-icons-sprite{
      position:absolute !important;
      width:0 !important;
      height:0 !important;
      overflow:hidden !important;
      left:-9999px !important;
      top:-9999px !important;
    }

    /* 1) Aumentar distância: logo/wordmark ↔ campo da frase */
    .brand-lockup{
      margin-bottom: 18px !important;
    }

    /* 2) Remover o “ponto” do campo da frase (não renderiza e não reserva espaço) */
    .home-pill-dot{ display:none !important; }

    /* Reforça centralização do texto no pill */
    .home-pill{
      justify-content: center !important;
      gap: 0 !important;
      padding: 0 18px !important;
    }

    /* 3) Tagline 2x e em verde oliva (igual vibe Falconi) */
    .home-tagline{
      margin-top: 10px;
      text-align: center;
      font-size: clamp(22px, 2.4vw, 36px); /* ~2x */
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.18;
      color: var(--fnav-accent, #5b5a1b);
    }

    /* 4) Menu (dropdown) preto com fonte branca */
    .home-clean .menu{
      background: #0b0b0b !important;
      border-color: rgba(255,255,255,.18) !important;
      box-shadow: 0 18px 40px rgba(0,0,0,.22) !important;
    }
    .home-clean .menu-item{
      color: rgba(255,255,255,.92) !important;
      font-weight: 500 !important;
    }
    .home-clean .menu-item:hover{
      background: rgba(255,255,255,.08) !important;
    }

    /* Avatar mantém preto, mas texto já é branco */
    .avatar{ background:#111 !important; color:#fff !important; }

    /* Ícones em preto (sem verde) */
    .shortcut-ico svg{ color: #111 !important; }

    /* (mantém o “subir um pouco” do conteúdo para caber a tagline) */
    .home-wrap{
      padding-top: 80px !important;
      padding-bottom: 120px !important;
    }
    .home-center{ gap: 14px !important; }

    .home-tagline{
      margin-top: 10px;
      text-align: center;
      font-size: clamp(22px, 2.4vw, 36px);
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.18;
    
      /* OLIVA FECHADO (igual “Atuação global”) */
      color: #7B7424 !important;
    }

    /* ÍCONES: cor oliva + 10% maior (sem mexer no card) */
    .home-clean .shortcut-ico svg{
      color: #7B7424 !important;     /* oliva fechado (igual Falconi) */
      width: 26px !important;        /* antes ~24px */
      height: 26px !important;       /* antes ~24px */
    }
    
    /* Opcional: deixa o traço com aparência ainda mais “premium” */
    .home-clean .shortcut-ico svg *{
      stroke-width: 1.9;             /* se achar “grosso”, volte para 1.8 */
    }
    
    /* Garante que o hover não altere a cor */
    .home-clean .shortcut:hover .shortcut-ico svg{
      color: #7B7424 !important;
    }

    /* Compatibilidade: caso algum símbolo use fill */
    .home-clean .shortcut-ico svg [fill]:not([fill="none"]){
      fill: #7B7424 !important;
    }
    .home-clean .shortcut-ico svg [stroke]{
      stroke: #7B7424 !important;
    }

    /* Botão sanduíche: ícone interno branco (mantém o botão premium) */
    .home-clean .icon-btn svg,
    .home-clean .icon-btn svg use{
      color: #fff !important;
      stroke: #fff !important;
    }
    
    /* Se o ícone for desenhado via currentColor, garante */
    .home-clean .icon-btn{
      color: #fff !important;
    }
  </style>
</head>

<body class="home-clean">

  <!-- SVG sprite (DEVE ficar invisível) -->
  <svg class="home-icons-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-menu" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-wrench" viewBox="0 0 24 24">
      <path d="M14.7 6.3a5 5 0 0 0-6.5 6.5L3 18l3 3 5.2-5.2a5 5 0 0 0 6.5-6.5l-2.2 2.2-2.8-2.8 2-2.3Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-grad" viewBox="0 0 24 24">
      <path d="M12 3 2 8l10 5 10-5-10-5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M6 10v6c0 1.7 2.7 3 6 3s6-1.3 6-3v-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-file" viewBox="0 0 24 24">
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-6Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8 13h8M8 17h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 19a2 2 0 0 0 2 2h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M4 5a2 2 0 0 1 2-2h14v16H6a2 2 0 0 0-2 2V5Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>

    <symbol id="i-briefcase" viewBox="0 0 24 24">
      <path d="M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M4 7h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M2 12h20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </svg>

  <!-- Topo direito: sanduíche + avatar -->
  <header class="home-top" aria-label="Topo">
    <div class="home-top-spacer"></div>

    <div class="home-top-actions">
      <button class="icon-btn" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="homeMenu">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-menu"></use></svg>
      </button>

      <a class="avatar" href="{{ account.href }}" aria-label="Conta">
        <span>{{ account.initials }}</span>
      </a>

      <div class="menu" id="homeMenu" role="menu" aria-label="Menu principal">
        {% for l in nav_links %}
          <a class="menu-item" role="menuitem" href="{{ l.href }}">{{ l.label }}</a>
        {% endfor %}
      </div>
    </div>
  </header>

  <main class="home-wrap">
    <section class="home-center" aria-label="Home Stegie">

      <!-- Marca -->
      <div class="brand-lockup" aria-label="Marca Stegie">
        <img
          class="brand-logo"
          src="{{ url_for('static', filename='img/logo-stegie.png') }}?v={{ config.get('ASSET_VERSION','1') }}"
          alt="Stegie"
          loading="eager"
          decoding="async"
        />
        <div class="home-brand" aria-label="Stegie">Stegie</div>
      </div>

      <!-- Barra central (frase do dia) -->
      <div class="home-pill" aria-label="Acesso rápido">
        <span class="home-pill-text" id="dailyPhrase">Acesso rápido aos recursos da plataforma</span>
      </div>

      <!-- Atalhos -->
      <nav class="home-shortcuts" aria-label="Atalhos">
        {% for s in shortcuts %}
          <a class="shortcut" href="{{ s.href }}" aria-label="{{ s.label }}">
            <span class="shortcut-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24"><use href="#{{ s.icon }}"></use></svg>
            </span>
            <span class="shortcut-label">{{ s.label }}</span>
          </a>
        {% endfor %}
      </nav>

      <!-- Tagline -->
      <div class="home-tagline" aria-label="Tagline">
        Stegie - Inteligência para performance em malharia.
      </div>

    </section>
  </main>

  <!-- Rodapé (links expostos) -->
  <footer class="home-footer" aria-label="Rodapé">
    <div class="footer-row footer-links">
      {% for l in nav_links %}
        <a href="{{ l.href }}">{{ l.label }}</a>
      {% endfor %}
    </div>
  </footer>

  <script>
    (function(){
      // -------- Menu sanduíche --------
      const btn = document.getElementById('menuBtn');
      const menu = document.getElementById('homeMenu');

      function closeMenu(){
        btn.setAttribute('aria-expanded', 'false');
        menu.classList.remove('is-open');
      }
      function toggleMenu(){
        const open = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!open));
        menu.classList.toggle('is-open', !open);
      }

      btn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });

      document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== btn) closeMenu();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });

      // -------- Frase do dia (15 frases, alterna diariamente) --------
      const phrases = [
        "Qualidade que vira padrão — todo dia.",
        "Eficiência nasce de rotina bem feita.",
        "Treinar pessoas é acelerar resultado.",
        "Processo simples, controle forte.",
        "Decisão rápida com critério claro.",
        "Menos variação. Mais previsibilidade.",
        "Tecnologia a favor do chão de fábrica.",
        "Dados certos → ajustes certos.",
        "Produtividade sem perder qualidade.",
        "Fichas técnicas que guiam a operação.",
        "Pessoas bem treinadas sustentam o sistema.",
        "Qualidade é método, não sorte.",
        "Padronize o essencial. Execute melhor.",
        "Do problema ao plano: ação objetiva.",
        "Controle diário, melhoria contínua."
      ];

      function dayOfYear(d){
        const start = new Date(d.getFullYear(), 0, 0);
        return Math.floor((d - start) / 86400000);
      }

      const el = document.getElementById("dailyPhrase");
      if (el){
        const idx = dayOfYear(new Date()) % phrases.length;
        el.textContent = phrases[idx];
      }
    })();
  </script>
</body>
</html>
