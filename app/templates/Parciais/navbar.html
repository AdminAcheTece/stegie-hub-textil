<!-- Parciais/navbar.html -->
<nav class="st-fnav" aria-label="Navegação principal">
  <div class="st-fnav__inner">
    <a class="st-fnav__brand" href="{{ url_for('home') }}" aria-label="Ir para a home">
      {# Logo opcional no header (recomendado ser branco) #}
      <img
        class="st-fnav__logo"
        src="{{ url_for('static', filename='img/logo-stegie-branca.png') }}"
        alt="Stegie"
        loading="eager"
        decoding="async"
      />
      <span class="st-fnav__word">Stegie</span>
    </a>

    <!-- Menu desktop -->
    <div class="st-fnav__menu" role="menubar" aria-label="Menu">
      <a class="st-fnav__item" role="menuitem" href="{{ url_for('servicos') }}">Soluções</a>
      <a class="st-fnav__item" role="menuitem" href="{{ url_for('conteudos') }}">Conteúdos</a>
      <a class="st-fnav__item" role="menuitem" href="{{ url_for('quem_somos') }}">Sobre</a>
    </div>

    <!-- Lado direito -->
    <div class="st-fnav__right">
      <button
        class="st-fnav__burger"
        id="fnavBurger"
        type="button"
        aria-label="Abrir menu"
        aria-expanded="false"
        aria-controls="fnavMobile"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="st-fnav__accent" aria-hidden="true"></div>

  <!-- Menu mobile (fica ESCONDIDO por padrão via atributo hidden) -->
  <div class="st-fnav__mobile" id="fnavMobile" hidden>
    <a href="{{ url_for('servicos') }}">Soluções</a>
    <a href="{{ url_for('conteudos') }}">Conteúdos</a>
    <a href="{{ url_for('quem_somos') }}">Sobre</a>
    <a href="{{ url_for('contato') }}">Contato</a>
  </div>
</nav>
