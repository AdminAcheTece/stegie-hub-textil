<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="STEGIE Hub Têxtil — plataforma de serviços." />

  <title>{% block title %}STEGIE Hub Têxtil{% endblock %}</title>

  <!-- Fonte (pode trocar depois) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='CSS/stegie.css') }}">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('home') }}">
        <span class="brand-mark">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="STEGIE" style="width:20px;height:20px;">
        </span>
        <span class="brand-name">STEGIE</span>
        <span class="brand-sub">Hub Têxtil</span>
      </a>

      <nav class="nav" id="nav">
        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
        <a class="nav-link" href="{{ url_for('servicos') }}">Serviços</a>
        <a class="nav-link" href="{{ url_for('planos') }}">Planos</a>
      </nav>

      <div class="header-actions">
        <a class="btn btn-ghost" href="{{ url_for('login') }}">Entrar</a>
        <a class="btn btn-primary" href="{{ url_for('cadastro') }}">Começar</a>
        <button class="btn btn-ghost nav-toggle" type="button" data-nav-toggle aria-label="Abrir menu">☰</button>
      </div>
    </div>

    <div class="container nav-mobile" data-nav-mobile hidden>
      <a class="nav-link" href="{{ url_for('home') }}">Home</a>
      <a class="nav-link" href="{{ url_for('servicos') }}">Serviços</a>
      <a class="nav-link" href="{{ url_for('planos') }}">Planos</a>
      <a class="nav-link" href="{{ url_for('login') }}">Entrar</a>
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <div class="footer-title">STEGIE Hub Têxtil</div>
        <div class="muted">Tecnologia, processos e inteligência aplicada ao têxtil.</div>
      </div>
      <div class="footer-links">
        <a class="nav-link" href="mailto:contato@stegie.com.br">contato@stegie.com.br</a>
      </div>
    </div>
  </footer>
</body>
</html>
