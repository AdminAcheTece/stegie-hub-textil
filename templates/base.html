<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="STEGIE Hub Têxtil — plataforma de serviços e soluções têxteis." />

    <title>{% block title %}STEGIE Hub Têxtil{% endblock %}</title>

    <!-- Tipografia (troque por outra se preferir) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/stegie.css') }}">
    {% block head %}{% endblock %}
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ url_for('main.home') }}">
          <span class="brand-mark">S</span>
          <span class="brand-name">STEGIE</span>
          <span class="brand-sub">Hub Têxtil</span>
        </a>

        <nav class="nav">
          <a href="#servicos" class="nav-link">Serviços</a>
          <a href="#planos" class="nav-link">Planos</a>
          <a href="#contato" class="nav-link">Contato</a>
        </nav>

        <div class="header-actions">
          <!-- Ajuste esses links quando criar auth -->
          <a class="btn btn-ghost" href="/login">Entrar</a>
          <a class="btn btn-primary" href="/cadastro">Começar</a>
        </div>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer" id="contato">
      <div class="container footer-inner">
        <div>
          <div class="footer-title">STEGIE Hub Têxtil</div>
          <div class="muted">Tecnologia, processos e inteligência aplicada ao têxtil.</div>
        </div>

        <div class="footer-links">
          <a class="nav-link" href="#">Política de Privacidade</a>
          <a class="nav-link" href="#">Termos</a>
          <a class="nav-link" href="mailto:contato@stegie.com.br">contato@stegie.com.br</a>
        </div>
      </div>
    </footer>
  </body>
</html>
