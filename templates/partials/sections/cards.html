<section class="section" data-reveal>
  <div class="container">
    <h2>{{ cards.title }}</h2>
    {% if cards.subtitle %}<p>{{ cards.subtitle }}</p>{% endif %}

    <div class="{{ cards.grid_class or 'grid-2' }}" style="margin-top:18px;">
      {% for c in cards.items %}
        <div class="card ed-card">
          <h3>{{ c.h }}</h3>
          <p>{{ c.p }}</p>
          <a class="ed-card__link" href="{{ c.href }}">{{ c.link }}</a>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
